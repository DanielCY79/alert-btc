# =========================
# 策略参数配置
# trend:
#   趋势相关参数，主要用于均线和区间背景过滤。
# range:
#   区间识别参数，控制区间宽度、边缘触达次数、重叠度等。
# breakout:
#   突破确认参数，控制突破收盘、量能、最大延伸和失效阈值。
# failure:
#   假突破参数，控制探针深度、重回区间要求和影线质量。
# pullback:
#   突破后回踩参数，控制回踩触达、守住突破位和回踩量能。
# =========================
monitoring.strategy.trend.fast-period=20
monitoring.strategy.trend.slow-period=60
monitoring.strategy.range.lookback=36
monitoring.strategy.range.min-width=0.03
monitoring.strategy.range.max-width=0.18
monitoring.strategy.range.edge-tolerance=0.015
monitoring.strategy.range.required-edge-touches=2
monitoring.strategy.range.overlap-threshold=0.45
monitoring.strategy.range.min-overlap-bars=12
monitoring.strategy.range.ma-flat-threshold=0.012
monitoring.strategy.breakout.close-buffer=0.003
monitoring.strategy.breakout.volume-multiplier=1.5
monitoring.strategy.breakout.body-ratio-threshold=0.45
monitoring.strategy.breakout.max-extension=0.05
monitoring.strategy.breakout.failure-buffer=0.008
monitoring.strategy.breakout.record.ttl.ms=43200000
monitoring.strategy.failure.probe-buffer=0.003
monitoring.strategy.failure.reentry-buffer=0.001
monitoring.strategy.failure.min-wick-body-ratio=1.20
monitoring.strategy.pullback.touch-tolerance=0.008
monitoring.strategy.pullback.hold-buffer=0.006
monitoring.strategy.pullback.max-volume-ratio=1.10
