spring.application.name=alert
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# Base application settings

# Backtest runtime settings
backtest.enabled=false
backtest.strategy.type=${monitoring.strategy.type}
backtest.symbol=BTCUSDT
backtest.interval=${monitoring.kline.interval}
backtest.start=2020-01-01T00:00:00Z
backtest.end=
backtest.export-excel.enabled=true
backtest.export-excel.path=D:/backtest_result/
backtest.export.initial-capital=10000

# Monitoring runtime settings
monitoring.cycle=15000
monitoring.initial-delay=0
monitoring.target-symbol=BTCUSDT
monitoring.kline.interval=3m
monitoring.kline.limit=360
monitoring.strategy.type=priceaction
monitoring.strategy.id=priceaction-3m-4h
monitoring.strategy.label=Price Action 3m/4h
monitoring.strategy.standalone-enabled=true

# Market data access settings
monitoring.market-data.websocket.enabled=true
monitoring.market-data.websocket.base-url=wss://fstream.binance.com/ws
monitoring.market-data.websocket.cache-size=${monitoring.kline.limit}
monitoring.market-data.websocket.bootstrap-limit=${monitoring.kline.limit}
monitoring.market-data.websocket.stale-threshold-ms=90000
monitoring.market-data.websocket.reconnect-delay-ms=5000
monitoring.market-data.websocket.health-check-ms=30000
monitoring.market-data.force-order.websocket.enabled=true
monitoring.market-data.force-order.websocket.base-url=wss://fstream.binance.com/ws
monitoring.market-data.force-order.websocket.retention-ms=300000
monitoring.market-data.force-order.websocket.reconnect-delay-ms=5000
monitoring.market-data.derivatives.enabled=true
monitoring.market-data.derivatives.snapshot-interval-ms=15000
monitoring.market-data.derivatives.snapshot-initial-delay-ms=10000
monitoring.market-data.derivatives.oi-window-ms=180000
monitoring.market-data.derivatives.funding-lookback=30
monitoring.market-data.derivatives.taker-period=1m
monitoring.market-data.derivatives.taker-limit=1
monitoring.market-data.derivatives.ratio-period=1m
monitoring.market-data.derivatives.ratio-limit=2
monitoring.market-data.derivatives.liquidation-window-ms=180000

# Feature layer settings
monitoring.feature.price.volume-lookback=20
monitoring.feature.price.atr-period=14
monitoring.feature.event.lookback-ms=3600000
monitoring.feature.event.half-life-ms=1800000
monitoring.feature.policy.enabled=true
monitoring.feature.policy.range-failure.min-score=0.50
monitoring.feature.policy.breakout.min-score=0.55
monitoring.feature.policy.max-regime-risk=0.88
monitoring.feature.policy.missing-derivative-penalty=0.03
monitoring.feature.policy.veto.crowding-extreme=0.80
monitoring.feature.policy.veto.breakout-confirmation=-0.20
monitoring.feature.policy.veto.trend-bias=-0.35
monitoring.feature.policy.veto.event-bias=-0.60
monitoring.feature.policy.veto.event-risk-gate=0.45
monitoring.feature.policy.veto.crowded-breakout-risk-gate=0.70
monitoring.feature.policy.weights.range-failure.trend=0.18
monitoring.feature.policy.weights.range-failure.breakout=0.10
monitoring.feature.policy.weights.range-failure.event=0.12
monitoring.feature.policy.weights.range-failure.crowding=0.12
monitoring.feature.policy.weights.range-failure.regime-risk=0.18
monitoring.feature.policy.weights.breakout.trend=0.18
monitoring.feature.policy.weights.breakout.breakout=0.26
monitoring.feature.policy.weights.breakout.event=0.10
monitoring.feature.policy.weights.breakout.crowding=0.08
monitoring.feature.policy.weights.breakout.regime-risk=0.22
monitoring.feature.policy.weights.pullback.trend=0.24
monitoring.feature.policy.weights.pullback.breakout=0.18
monitoring.feature.policy.weights.pullback.event=0.10
monitoring.feature.policy.weights.pullback.crowding=0.06
monitoring.feature.policy.weights.pullback.regime-risk=0.18

# Market state settings
monitoring.market-state.range.max-trend-bias=0.35
monitoring.market-state.range.max-breakout-confirmation=0.30
monitoring.market-state.breakout.min-confirmation=0.55
monitoring.market-state.breakout.min-strength=0.60
monitoring.market-state.breakout.min-body-ratio=0.45
monitoring.market-state.breakout.continuation-confirmation=0.25
monitoring.market-state.pullback.min-trend-bias=0.20
monitoring.market-state.pullback.max-confirmation=0.45
monitoring.market-state.pullback.max-strength=0.55
monitoring.market-state.pullback.max-volume-ratio=1.20
monitoring.market-state.pullback.edge-zone=0.35
monitoring.market-state.trend.min-trend-bias=0.40
monitoring.market-state.trend.min-ma-spread=0.010

# Network settings
network.proxy.enabled=true
network.proxy.host=127.0.0.1
network.proxy.port=7897
network.http.connect-timeout-ms=60000
network.http.read-timeout-ms=30000

# Document event access settings
gdelt.doc.enabled=false
gdelt.doc.base-url=https://api.gdeltproject.org/api/v2/doc/doc
gdelt.doc.query=(bitcoin OR btc OR ethereum OR eth OR solana OR sol OR binance OR sec OR etf)
gdelt.doc.timespan=1h
gdelt.doc.max-records=25
gdelt.doc.sort=datedesc
gdelt.doc.source-quality=0.70
gdelt.doc.initial-delay-ms=30000
gdelt.doc.poll-delay-ms=300000
gdelt.doc.processed-ttl-ms=604800000

# Notification settings
