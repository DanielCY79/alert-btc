spring.application.name=alert

# =========================
# 应用基础配置
# =========================

# =========================
# 回测配置
# backtest.enabled:
#   是否启用回测模式。
#   true 时，应用启动后直接执行回测并退出；
#   false 时，应用按实时监控模式运行。
# =========================
backtest.enabled=false
backtest.symbol=BTCUSDT
backtest.interval=4h
backtest.start=2020-01-01T00:00:00Z
backtest.end=
backtest.holding-bars.range=12
backtest.holding-bars.breakout=18
backtest.holding-bars.pullback=18
backtest.fallback-target-r.multiple=1.50
backtest.policy.missing-derivative-penalty=0.00
backtest.position.scale-out.trigger-r=1.00
backtest.position.scale-out.fraction=0.50
backtest.position.trailing.activation-r=1.20
backtest.position.trailing.distance-r=1.00
backtest.position.pyramid.max-adds=1
backtest.position.pyramid.trigger-r=1.60
backtest.position.pyramid.add-size=0.35
backtest.position.failed-follow-through.max-bars=2
backtest.position.failed-follow-through.adverse-r=0.35
backtest.position.failed-follow-through.min-body-ratio=0.40
backtest.position.failed-follow-through.close-location=0.35

