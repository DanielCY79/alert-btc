notification.cooldown-ms=300000
notification.enterprise-wechat.enabled=true
notification.enterprise-wechat.webhook-url=https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=b0250fb8-5677-41c1-a914-311008c91ea8
notification.feishu.enabled=true
notification.feishu.webhook-url=https://open.feishu.cn/open-apis/bot/v2/hook/8f69cc69-e436-4f2d-aa21-740974ae45d8

