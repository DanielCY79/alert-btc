# =========================
# 策略参数配置
# trend:
#   趋势相关参数，主要用于均线和区间背景过滤。
# range:
#   区间识别参数，控制区间宽度、边缘触达次数、重叠度等。
# breakout:
#   突破确认参数，控制突破收盘、量能、最大延伸和失效阈值。
# failure:
#   假突破参数，控制探针深度、重回区间要求和影线质量。
# pullback:
#   突破后回踩参数，控制回踩触达、守住突破位和回踩量能。
# =========================
monitoring.strategy.trend.fast-period=20
monitoring.strategy.trend.slow-period=60
monitoring.strategy.range.lookback=36
monitoring.strategy.range.min-width=0.03
