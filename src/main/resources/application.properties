spring.application.name=alert

# monitoring
monitoring.cycle=60000
monitoring.kline.interval=15m
monitoring.kline.limit=80

# strategy
monitoring.strategy.trend.fast-period=20
monitoring.strategy.trend.slow-period=60
monitoring.strategy.breakout.lookback=20
monitoring.strategy.breakout.max-range=0.05
monitoring.strategy.breakout.close-buffer=0.0015
monitoring.strategy.breakout.volume-multiplier=1.8
monitoring.strategy.breakout.max-extension=0.04
monitoring.strategy.breakout.failure-buffer=0.008
monitoring.strategy.breakout.record.ttl.ms=43200000
monitoring.strategy.pullback.touch-tolerance=0.008
monitoring.strategy.pullback.hold-buffer=0.006
monitoring.strategy.pullback.max-volume-ratio=1.10
