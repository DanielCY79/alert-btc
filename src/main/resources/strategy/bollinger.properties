# Bollinger multi-timeframe strategy defaults

monitoring.strategy.default-id=bollinger-1m-4h
monitoring.strategy.default-label=Bollinger 1m/4h

monitoring.strategy.boll.entry-interval=1m
monitoring.strategy.boll.entry-kline-limit=240
monitoring.strategy.boll.context-interval=4h
monitoring.strategy.boll.context-kline-limit=80
monitoring.strategy.boll.period=20
monitoring.strategy.boll.stddev-multiplier=2.0
monitoring.strategy.boll.entry-volume-lookback=20
monitoring.strategy.boll.stop-loss-pct=0.10
monitoring.strategy.boll.context-trend-lookback-bars=3
monitoring.strategy.boll.context-min-middle-rise-pct=0.0020
monitoring.strategy.boll.context-min-close-buffer-pct=0.0015
monitoring.strategy.boll.context-bandwidth-lookback-bars=0
monitoring.strategy.boll.context-min-bandwidth-expansion-pct=0.0000
monitoring.strategy.boll.fast-failure-max-bars=360
monitoring.strategy.boll.fast-failure-loss-pct=0.0035
monitoring.strategy.boll.reentry-cooldown-bars=240
monitoring.strategy.boll.max-entries-per-context-bar=1
